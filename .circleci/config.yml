version: 2.1
orbs:
  architect: giantswarm/architect@9.3.0

workflows:
  package-and-push-chart-on-tag:
    jobs:
    - architect/push-to-registries:
        context: architect
        name: push-to-registries
        # architect v9 always builds with docker buildx; the platforms list
        # now defaults to linux/amd64,linux/arm64. The arm64 image is built
        # under QEMU emulation and the Go compile times out (>20m). Pin to
        # linux/amd64 to preserve the pre-v9 single-arch behaviour.
        platforms: linux/amd64
        filters:
          tags:
            only: /^v.*/

    - architect/push-to-app-catalog:
        context: architect
        executor: app-build-suite
        name: package-and-push-chart
        app_catalog: giantswarm-catalog
        app_catalog_test: giantswarm-test-catalog
        chart: 'hr-recovery-controller'
          # Trigger job on git tag.
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore:
            - main
