apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "labels.selector" . | nindent 6 }}
  policyTypes:
    - Egress
    - Ingress
  egress:
    - {}
  ingress:
    - ports:
        - port: {{ .Values.metrics.port }}
          protocol: TCP
